services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: football_predictor
      POSTGRES_USER: football
      POSTGRES_PASSWORD: football
    ports:
      - "5433:5432"
    volumes:
      - football_predictor_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://football:football@postgres:5432/football_predictor
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  football_predictor_pg:

